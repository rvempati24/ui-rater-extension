name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    env:
      UI_RATER_DISABLE_EXTERNAL_WRITES: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install video evidence toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends 'ffmpeg=7:6.1.1-3ubuntu5'
          ffmpeg -version
          ffprobe -version
      - name: Python tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
      - name: Standalone evaluator package
        run: |
          PYTHONPATH=packages/usability-evaluator/src \
            python -m unittest discover -s packages/usability-evaluator/tests -v
          python -m pip wheel ./packages/usability-evaluator \
            --no-deps --wheel-dir /tmp/evaluator-wheel
          python -m venv /tmp/evaluator-venv
          /tmp/evaluator-venv/bin/pip install --no-deps \
            /tmp/evaluator-wheel/ui_usability_evaluator-*.whl
          cd /tmp
          env -u PYTHONPATH /tmp/evaluator-venv/bin/ux-eval --help
          env -u PYTHONPATH /tmp/evaluator-venv/bin/python -c \
            'from importlib.resources import files; assert files("ui_usability_evaluator.resources").joinpath("contracts/contract-lock.json").is_file()'
      - name: Install workspace dependencies
        run: npm ci
      - name: JavaScript and TypeScript tests
        run: npm test
      - name: Typecheck
        run: npm run typecheck
      - name: Production build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Real three-service end-to-end tests
        run: npm run test:e2e
      - name: Extension syntax
        run: |
          node --check popup.js
          node --check background.js
          node --check content.js
          node --check offscreen.js
          node --check task-session.js
