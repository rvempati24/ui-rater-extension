[metadata]
name = ui-usability-evaluator
version = 0.1.0
description = Offline Method 3 usability evaluation and remediation artifacts
long_description = file: README.md
long_description_content_type = text/markdown

[options]
package_dir =
    = src
packages = find:
python_requires = >=3.9
include_package_data = True

[options.packages.find]
where = src

[options.package_data]
ui_usability_evaluator =
    resources/policies/*.json
    resources/calibration/*.json
    resources/schemas/*.json
    resources/contracts/*.json

[options.entry_points]
console_scripts =
    ux-eval = ui_usability_evaluator.cli:main
