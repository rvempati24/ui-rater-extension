name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -v
      - run: python -m pip wheel . --no-deps --wheel-dir dist
      - run: |
          python -m venv /tmp/evaluator-venv
          /tmp/evaluator-venv/bin/pip install --no-deps dist/ui_usability_evaluator-*.whl
          cd /tmp
          env -u PYTHONPATH /tmp/evaluator-venv/bin/ux-eval --help
